<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestión de Empleados - PaintFlow 2</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700" rel="stylesheet">

                    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            min-height: 100vh;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: #fff;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(30, 90, 150, 0.15);
            border-bottom: 2px solid #e0e0e0;
            gap: 30px;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar img {
            height: 48px;
            width: auto;
            cursor: pointer;
            filter: brightness(0.9);
        }

        .navbar h1 {
            color: #1e5a96;
            font-size: 1.5em;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin: 0;
        }


        /* ===== TAB BUTTONS ===== */
        .navbar-tabs {
            display: flex;
            gap: 0;
            flex: 1;
            align-items: center;
        }

        .tab-btn {
            padding: 20px 24px;
            background: transparent;
            color: #999;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .tab-btn:hover {
            color: #1e5a96;
            background: transparent;
        }

        .tab-btn.active {
            color: #1e5a96;
            border-bottom-color: #1e5a96;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .navbar-right {
            display: flex;
            align-items: center;
        }

        /* ===== USER DROPDOWN ===== */
        .user-dropdown {
            position: relative;
        }

        .user-dropdown-btn {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: #fff;
            padding: 10px 18px;
            border-radius: 25px;
            border: 1px solid rgba(26, 115, 232, 0.3);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.25);
        }

        .user-dropdown-btn:hover {
            background: linear-gradient(135deg, #0d47a1 0%, #0a2e6b 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 115, 232, 0.35);
        }

        .user-dropdown-btn::after {
            content: 'v';
            font-size: 0.7em;
            transition: transform 0.3s ease;
        }

        .user-dropdown-btn.active::after {
            transform: rotate(180deg);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
            font-weight: 700;
            color: #1a73e8;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }


        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-width: 160px;
            box-shadow: 0 8px 24px rgba(30, 90, 150, 0.2);
            display: none;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-menu button {
            padding: 12px 16px;
            border: none;
            background: none;
            text-align: left;
            color: #333;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s ease;
        }

        .dropdown-menu button:hover {
            background: #f5f5f5;
            color: #1e5a96;
        }

        .dropdown-menu button:last-child {
            color: #e74c3c;
            border-top: 1px solid #eee;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            padding: 35px 40px;
            overflow-y: auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .section-header h2 {
            color: #1e5a96;
            font-size: 1.8em;
            font-weight: 800;
            margin: 0;
        }

        /* ===== BOTÓN AGREGAR ===== */
        .btn-primary {
            padding: 12px 28px;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(39, 174, 96, 0.4);
        }

        /* ===== SUCURSAL TABS ===== */
        .sucursal-tabs {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
            padding: 0;
            background: none;
            border-radius: 0;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            overflow-x: auto;
            white-space: nowrap;
        }

        .sucursal-tab-btn {
            padding: 12px 0;
            background: none;
            color: #999;
            border: none;
            border-bottom: 3px solid transparent;
            border-radius: 0;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: capitalize;
            letter-spacing: 0;
            position: relative;
            box-shadow: none;
            flex-shrink: 0;
        }

        .sucursal-tab-btn:hover {
            color: #1e5a96;
            background: none;
            border-color: transparent;
            box-shadow: none;
            transform: none;
        }

        .sucursal-tab-btn.active {
            color: #27ae60;
            background: rgba(30, 90, 150, 0.08);
            border-bottom-color: #1e5a96;
            border-color: #1e5a96;
            box-shadow: none;
        }

        /* ===== CARD ===== */
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8e8e8;
            overflow-x: auto;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }

        thead {
            background: #f5f5f5;
        }

        th {
            padding: 16px 14px;
            text-align: left;
            font-weight: 700;
            color: #333;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 16px 14px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        /* ===== STATUS BADGE ===== */
        .status-active {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-inactive {
            display: inline-block;
            background: #f8d7da;
            color: #721c24;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }


        .dashboard-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    
        /* ===== BOTONES TABLA ===== */
        .btn-edit {
            padding: 8px 16px;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 8px;
            font-size: 0.75em;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.35);
        }

        .btn-delete {
            padding: 8px 16px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75em;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.35);
        }

        /* ===== LOADING / NO DATA ===== */
        .loading, .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 0.95em;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #fff;
            padding: 35px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .close:hover {
            color: #000;
        }

        .modal-content h2 {
            color: #1e5a96;
            font-size: 1.4em;
            margin-bottom: 20px;
            margin-top: 10px;
        }

        /* ===== FORM GROUPS ===== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: Roboto, sans-serif;
            font-size: 0.95em;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1e5a96;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(30, 90, 150, 0.1);
        }

        /* ===== MODAL BUTTONS ===== */
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 20px;
            }

            .navbar-left {
                gap: 12px;
            }

            .navbar img {
                height: 40px;
            }

            .navbar h1 {
                font-size: 1.2em;
            }

            .main-content {
                padding: 20px;
            }

            .section-header {
                flex-direction: column;
                gap: 15px;
            }

            .btn-primary {
                width: 100%;
            }

            .sucursal-tabs {
                margin-bottom: 20px;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 12px 8px;
            }

            .card {
                padding: 0;
            }

            .modal-content {
                width: 95%;
            }
        }
        /* ===== MODAL PERFIL ===== */
        #modalPerfil {
            display: none;
        }

        #modalPerfil.active {
            display: flex !important;
        }

        .perfil-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .perfil-form input {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: Roboto, sans-serif;
            font-size: 0.95em;
        }

        .perfil-form input:focus {
            outline: none;
            border-color: #1e5a96;
            box-shadow: 0 0 0 3px rgba(30, 90, 150, 0.1);
        }

        .perfil-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .perfil-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .perfil-buttons .btn-save {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: #fff;
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.25);
        }

        .perfil-buttons .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.35);
        }

        .perfil-buttons .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .perfil-buttons .btn-cancel:hover {
            background: #e0e0e0;
        }

    </style>

</head>

<body>

    <script>
        // Cargar nombre del usuario inmediatamente desde localStorage
        try {
            const userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
            const nombre = userData.nombre_completo || userData.username || 'Usuario';
            document.addEventListener('DOMContentLoaded', function() {
                const nameElement = document.getElementById('userNameDisplay');
                if (nameElement) {
                    nameElement.textContent = nombre;
                }
            });
        } catch(e) {
            console.error('Error cargando nombre:', e);
        }
    </script>

    <div class="navbar">

        <img src="/logo.png" alt="PaintFlow Logo" style="height: 60px; width: auto; cursor: pointer;" onclick="switchTab(event, 'dashboard')">
        
        <div class="navbar-tabs" style="display: flex; gap: 0; flex: 1; align-items: center;">
            <button class="tab-btn" onclick="switchTab(event, 'empleados')">EMPLEADOS</button>
        </div>

        <div class="navbar-right">

            <div class="user-dropdown">

                <button class="user-dropdown-btn" id="userDropdownBtn" onclick="toggleUserDropdown()">

                    <div class="user-avatar" id="userAvatar">👤</div>

                    <span id="userNameDisplay">Usuario</span>

                </button>

                <div class="dropdown-menu" id="dropdownMenu">

                    <button onclick="goToAdminView()" style="color: #333; background: none; padding: 12px 16px; border: none; text-align: left; cursor: pointer; font-size: 0.9em;">Administrador</button>

                    <button onclick="abrirModalPerfil()">Perfil</button>

                    <button onclick="handleLogout()">Cerrar Sesión</button>

                </div>

            </div>

        </div>

    </div>



    <div class="main-content">

        <!-- Tab Dashboard -->
        <div id="dashboard" class="tab-content active" style="padding: 20px;">
            <!-- Dashboard con Gráficos -->
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px;">
            <!-- Empleados por Rol -->
            <div class="dashboard-card" style="padding: 20px; min-height: 350px; display: flex; flex-direction: column; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h3 style="margin-bottom: 15px; color: #1e5a96; flex-shrink: 0;">Empleados por Rol</h3>
                <div style="flex-grow: 1; position: relative; min-height: 280px;">
                    <canvas id="empleadosPorEstadoChart"></canvas>
                </div>
            </div>

            <!-- Estadísticas Generales -->
            <div class="dashboard-card" style="padding: 20px; min-height: 350px; display: flex; flex-direction: column; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h3 style="margin-bottom: 15px; color: #1e5a96; flex-shrink: 0;">Estadísticas Generales</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1;">
                    <div style="background: rgba(30, 90, 150, 0.1); padding: 15px; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                        <div style="font-size: 28px; font-weight: 700; color: #1e5a96;" id="totalEmpleados">0</div>
                        <div style="color: #666; font-size: 12px;">Total Empleados</div>
                    </div>
                    <div style="background: rgba(39, 174, 96, 0.1); padding: 15px; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                        <div style="font-size: 28px; font-weight: 700; color: #27ae60;" id="empleadosActivos">0</div>
                        <div style="color: #666; font-size: 12px;">Activos</div>
                    </div>
                    <div style="background: rgba(230, 126, 34, 0.1); padding: 15px; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                        <div style="font-size: 28px; font-weight: 700; color: #e67e22;" id="empleadosInactivos">0</div>
                        <div style="color: #666; font-size: 12px;">Inactivos</div>
                    </div>
                    <div style="background: rgba(155, 89, 182, 0.1); padding: 15px; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                        <div style="font-size: 28px; font-weight: 700; color: #9b59b6;" id="totalPuesto">0</div>
                        <div style="color: #666; font-size: 12px;">Puestos</div>
                    </div>
                </div>
            </div>
        </div>

        </div>

        <!-- Tab Gestión de Empleados -->
        <div id="empleados" class="tab-content" style="padding: 20px;">
            <div style="margin-bottom: 20px;">
                <button class="btn-agregar" onclick="abrirModalEmpleado()" style="background: linear-gradient(135deg, #27ae60 0%, #229954 100%); color: #fff; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600;">+ Agregar Empleado</button>
            </div>
            <div class="sucursal-tabs" id="sucursalTabsContainer2"></div>
            <div id="empleadosContainer2" style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></div>
        </div>

        <!-- Modal de Gestión de Empleados (ya no se usa) -->
        <div id="modalGestion" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
            <div style="background: #fff; width: 95%; max-width: 1200px; max-height: 85vh; border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
                <div style="padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="margin: 0; color: #1e5a96;">Gestión de Empleados</h2>
                    <button onclick="cerrarModalGestion()" style="background: #ccc; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600;">✕ Cerrar</button>
                </div>
                <div style="flex-grow: 1; overflow-y: auto; padding: 20px;">
                    <div style="margin-bottom: 20px;">
                        <button class="btn-agregar" onclick="abrirModalEmpleado()">+ Agregar</button>
                    </div>
                    <div class="sucursal-tabs" id="sucursalTabsContainer2"></div>
                    <div id="empleadosContainer2"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Contenedores ocultos para gestión -->
    <div id="oldContentContainer" style="display: none;">
        <div class="sucursal-tabs" id="sucursalTabsContainerOld"></div>
        <div id="empleadosContainerOld"></div>
    </div>



    <!-- MODAL PERFIL -->

    <div id="modalPerfil" class="modal">

        <div class="modal-content">

            <span class="close" onclick="cerrarModalPerfil()">&times;</span>

            <h2>Mi Perfil</h2>

            <div class="perfil-form">

                <div class="form-group">

                    <label>Nombre Completo</label>

                    <input type="text" id="perfilNombre" disabled>

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input type="email" id="perfilEmail" disabled>

                </div>

                <div class="form-group">

                    <label>Usuario</label>

                    <input type="text" id="perfilUsername" disabled>

                </div>

                <div class="form-group">

                    <label>Rol</label>

                    <input type="text" id="perfilRol" disabled>

                </div>

                <div class="perfil-buttons">

                    <button class="btn-cancel" onclick="cerrarModalPerfil()">Cerrar</button>

                </div>

            </div>

        </div>

    </div>



    <!-- MODAL EMPLEADO -->

    <div id="modalEmpleado" class="modal">

        <div class="modal-content">

            <span class="close" onclick="cerrarModalEmpleado()">&times;</span>

            <h2 id="modalTitle">Agregar Empleado</h2>

            <input type="hidden" id="editingEmpleadoId">

            

            <div class="form-group">

                <label>Nombre Completo *</label>

                <input type="text" id="inputNombreEmpleado">

            </div>

            <div class="form-group">

    <script>

        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'

            ? 'http://localhost:8001'

            : 'https://paintflow.onrender.com';



        let allEmpleados = [];

        let allSucursales = [];

        // Definir zonas (solo tiendas)

        const zonas = {

            "Santo_Domingo": ["Bella Vista", "Churchill", "Tiradentes", "San Martin", "Luperon", "Arroyo Hondo", "San Isidro", "Alameda", "Zona Oriental", "Villa Mella"],

            "Zona_Este": ["Romana", "Punta Cana", "Bavaro"],

            "Zona_Norte": ["La Vega", "Puerto Plata", "San Francisco", "Terrenas", "Rafael Vidal", "Santiago Bartolome Colon"],

            "Zona_Sur": ["BanÃ­"]

        };

        let currentUser = null;





        function updateUserAvatar(userData) {
            const avatarDiv = document.getElementById('userAvatar');
            if (!avatarDiv) return;

            // Si tiene foto, mostrarla
            if (userData.foto_perfil) {
                avatarDiv.innerHTML = '<img src="' + userData.foto_perfil + '" alt="Avatar">';
            } else {
                // Logo por defecto para administrador y analista
                if (userData.rol === 'administrador' || userData.rol === 'analista') {
                    avatarDiv.innerHTML = '<img src="/logo.png" alt="Logo" style="padding: 2px;">';
                } else {
                    // Para otros roles, iniciales o emoji
                    const nombre = userData.nombre_completo || userData.username || 'U';
                    const iniciales = nombre.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                    avatarDiv.textContent = iniciales;
                }
            }
        }

        function setupAnalista() {
            // Ocultar dashboard para analistas
            const dashboardDiv = document.getElementById('dashboard');
            if (dashboardDiv) {
                dashboardDiv.style.display = 'none';
            }
            
            // Cambiar logo click para ir a empleados en lugar de dashboard
            const logo = document.querySelector('.navbar img');
            if (logo) {
                logo.onclick = function(event) {
                    switchTab(event, 'empleados');
                };
            }
            
            // Asegurar que se muestra empleados por defecto
            setTimeout(() => {
                const empleadosDiv = document.getElementById('empleados');
                if (empleadosDiv) {
                    empleadosDiv.style.display = 'block';
                }
                const empleadosBtn = document.querySelector('button[onclick*="switchTab"][onclick*="empleados"]');
                if (empleadosBtn) {
                    empleadosBtn.classList.add('active');
                }
            }, 100);
        }


        function goToAdminView() {
            window.location.href = '/';
        }

        async function init() {

            // Verificar sesión

            const usuario = localStorage.getItem('currentUser');

            if (!usuario) {

                window.location.href = '/';

                return;

            }



            currentUser = usuario;

            // Extraer nombre del localStorage si es JSON, sino usar como esta

            try {

                const userDataStr = localStorage.getItem('currentUser');

                const userData = JSON.parse(userDataStr || '{}');

                const nombre = userData.nombre_completo || userData.username || usuario;

                document.getElementById('userNameDisplay').textContent = nombre;

            } catch(e) {

                document.getElementById('userNameDisplay').textContent = usuario;

            }

            

            // Obtener datos completos del usuario desde la API (para sucursal_id)

            try {

                const userRes = await fetch(API + '/api/v1/usuarios?limit=500');

                const userData = await userRes.json();

                const usuarios = userData.usuarios || [];

                currentUserData = usuarios.find(u => u.username === usuario || u.email === usuario);

                console.log('â Usuario cargado:', currentUserData?.nombre_completo, 'Sucursal ID:', currentUserData?.sucursal_id);

            } catch (e) {

                console.error('Error obteniendo datos del usuario:', e);

            }



            // Cargar datos

            await loadData();

        }




        // ===== MODAL DE GESTIÓN =====
        function abrirModalGestion() {
            const modal = document.getElementById('modalGestion');
            modal.style.display = 'flex';
        }

        function cerrarModalGestion() {
            const modal = document.getElementById('modalGestion');
            modal.style.display = 'none';
        }

        // Cerrar modal al hacer clic fuera
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('modalGestion');
            if (modal && e.target === modal) {
                cerrarModalGestion();
            }
        });

        // ===== GRÁFICOS Y ESTADÍSTICAS =====
        let empleadosPorEstadoChart = null;

        function updateDashboardCharts() {
            if (!allEmpleados || allEmpleados.length === 0) return;

            // Filtrar empleados de la sucursal del usuario
            const userSucursalId = parseInt(localStorage.getItem('userSucursalId') || 
                (localStorage.currentUser ? JSON.parse(localStorage.currentUser).sucursal_id : 0));
            
            const empleadosSucursal = userSucursalId ? 
                allEmpleados.filter(e => e.sucursal_id === userSucursalId) : 
                allEmpleados;

            // ===== ESTADÍSTICAS GENERALES =====
            document.getElementById('totalEmpleados').textContent = empleadosSucursal.length;
            
            const activos = empleadosSucursal.filter(e => e.activo === true || e.activo === 1).length;
            document.getElementById('empleadosActivos').textContent = activos;
            
            const inactivos = empleadosSucursal.length - activos;
            document.getElementById('empleadosInactivos').textContent = inactivos;
            
            const puestosUnicos = new Set(empleadosSucursal.map(e => e.puesto || 'N/A')).size;
            document.getElementById('totalPuesto').textContent = puestosUnicos;

            // ===== GRÁFICO DE EMPLEADOS POR ROL =====
            const ctx = document.getElementById('empleadosPorEstadoChart');
            if (!ctx) return;

            // Contar empleados por rol
            const rolesCounts = {};
            const rolesColors = {
                'administrador': '#1e5a96',
                'analista': '#3eb8cc',
                'operador': '#9b59b6',
                'facturador': '#f39c12',
                'colorista': '#e74c3c',
                'contabilidad': '#16a085'
            };

            empleadosSucursal.forEach(emp => {
                const rol = emp.rol || 'Sin rol';
                rolesCounts[rol] = (rolesCounts[rol] || 0) + 1;
            });

            // Calcular porcentajes
            const labels = Object.keys(rolesCounts);
            const data = Object.values(rolesCounts);
            const total = data.reduce((a, b) => a + b, 0);
            const dataWithPercentages = data.map(d => {
                const pct = total > 0 ? ((d / total) * 100).toFixed(1) : 0;
                return { value: d, percentage: pct };
            });

            // Asignar colores
            const colors = labels.map(rol => rolesColors[rol] || '#95a5a6');

            if (empleadosPorEstadoChart) {
                empleadosPorEstadoChart.destroy();
            }

            empleadosPorEstadoChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels.map((rol, i) => rol + ' (' + dataWithPercentages[i].percentage + '%)'),
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: {
                                    size: 12
                                }
                            }
                        }
                    }
                }
            });
        }


        // Función para cambiar entre tabs
        function switchTab(evt, name) {
            // Ocultar todos los tabs
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('empleados').style.display = 'none';
            
            // Remover clase active de todos los botones
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Mostrar el tab seleccionado
            if (name === 'dashboard') {
                document.getElementById('dashboard').style.display = 'block';
                updateDashboardCharts();
            } else if (name === 'empleados') {
                document.getElementById('empleados').style.display = 'block';
                renderEmpleados();
            }
            
            // Agregar clase active al botón clickeado
            if (evt) {
                evt.target.classList.add('active');
            }
        }

        async function loadData() {

            try {

                // Cargar sucursales

                const resSucursales = await fetch(API + '/api/v1/sucursales?limit=200');

                const dataSucursales = await resSucursales.json();

                allSucursales = dataSucursales.sucursales || [];

                

                // Filtrar solo sucursales que son tiendas (están en zonas)

                const sucursalesTiendas = Object.values(zonas).flat();

                const normalizar = (str) => str.toLowerCase()

                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")

                    .replace(/\s+/g, " ").trim();

                

                const sucursalesNormalizadas = sucursalesTiendas.map(normalizar);

                

                allSucursales = allSucursales.filter(s => {

                    const nombreNormalizado = normalizar(s.nombre);

                    return sucursalesNormalizadas.includes(nombreNormalizado) && s.estado === "activa";

                });



                // Cargar empleados

                const resEmpleados = await fetch(API + '/api/v1/empleados?limit=500');

                const dataEmpleados = await resEmpleados.json();

                allEmpleados = dataEmpleados.empleados || [];



                // Renderizar sucursales y establecer filtro
                renderSucursalTabs();
                
                // Ahora renderizar tabla y gráficos con sucursal ya seleccionada
                if (sucursalFiltro) {
                    renderEmpleados();
                    updateDashboardCharts();
                }

                populateSucursalSelect();

            } catch (e) {

                console.error('Error loading data:', e);

                document.getElementById('empleadosContainer2').innerHTML = '<div class="no-data">Error al cargar los datos</div>';

            }

        }



        function renderSucursalTabs() {

            const container = document.getElementById('sucursalTabsContainer2');

            const sucursalesConEmpleados = [...new Set(allEmpleados.map(e => e.sucursal_id))].filter(Boolean);

            const sucursales = allSucursales.filter(s => sucursalesConEmpleados.includes(s.id));



            if (sucursales.length === 0) {

                container.innerHTML = '<div style="padding: 20px; color: #999;">Sin sucursales con empleados</div>';

                return;

            }



            // Establecer automáticamente una sucursal si no hay filtro

            if (!sucursalFiltro) {

                // Si es analyst, usar su sucursal

                if (currentUserData && currentUserData.sucursal_id) {

                    sucursalFiltro = currentUserData.sucursal_id;

                    console.log('â Analyst: filtro por su sucursal:', currentUserData.sucursal_id);

                } else {

                    // Si es admin, usar la primera sucursal con empleados

                    sucursalFiltro = sucursales[0].id;

                    console.log('â Admin: filtro por primera sucursal:', sucursales[0].nombre);

                }

            }



            container.innerHTML = sucursales.map((s, i) => {

                const isUserSucursal = currentUserData && s.id === currentUserData.sucursal_id;

                const isActive = s.id === sucursalFiltro;

                return '<button class="sucursal-tab-btn ' + (isActive ? 'active' : '') + '" onclick="filtrarPorSucursal(' + s.id + ', event)" title="' + (isUserSucursal ? 'Tu sucursal' : '') + '">' + s.nombre + '</button>';

            }).join('');

        }



        function populateSucursalSelect() {

            const select = document.getElementById('inputSucursalEmpleado');

            select.innerHTML = allSucursales.map(s => '<option value="' + s.id + '">' + s.nombre + '</option>').join('');

        }



        let sucursalFiltro = null;



        function filtrarPorSucursal(sucursalId, evt) {

            // Si es analyst, no permitir cambio de sucursal

            if (currentUserData && currentUserData.sucursal_id) {

                console.log('Analyst: no puede cambiar sucursal');

                return;

            }

            

            sucursalFiltro = sucursalId;

            document.querySelectorAll('.sucursal-tab-btn').forEach(btn => btn.classList.remove('active'));

            evt.target.classList.add('active');

            renderEmpleados();
                updateDashboardCharts();

        }



        function renderEmpleados() {

            const container = document.getElementById('empleadosContainer2');

            

            // Requiere siempre una sucursal seleccionada

            if (!sucursalFiltro) {

                container.innerHTML = '<div class="no-data">Selecciona una sucursal</div>';

                return;

            }

            

            let empleados = allEmpleados.filter(e => e.sucursal_id === sucursalFiltro);



            if (empleados.length === 0) {

                container.innerHTML = '<div class="no-data">Sin empleados</div>';

                return;

            }



            const html = '<table style="width: 100%; border-collapse: collapse;">' +

                '<thead><tr style="background: #f5f5f5; color: #333;">' +

                    '<th style="padding: 12px; text-align: left; border: 1px solid #ddd; font-weight: 600;">NOMBRE</th>' +

                    '<th style="padding: 12px; text-align: left; border: 1px solid #ddd; font-weight: 600;">EMAIL</th>' +

                    '<th style="padding: 12px; text-align: left; border: 1px solid #ddd; font-weight: 600;">SUCURSAL</th>' +

                    '<th style="padding: 12px; text-align: left; border: 1px solid #ddd; font-weight: 600;">ROL</th>' +

                    '<th style="padding: 12px; text-align: left; border: 1px solid #ddd; font-weight: 600;">TELEFONO</th>' +

                    '<th style="padding: 12px; text-align: left; border: 1px solid #ddd; font-weight: 600;">ESTADO</th>' +

                    '<th style="padding: 12px; text-align: left; border: 1px solid #ddd; font-weight: 600;">ACCIONES</th>' +

                '</tr></thead>' +

                '<tbody>' +

                empleados.map(emp => {
                    const sucursal = allSucursales.find(s => s.id === emp.sucursal_id);
                    return '<tr style="border-bottom: 1px solid #ddd;">' +

                    '<td style="padding: 12px; border: 1px solid #ddd;">' + (emp.nombre_completo || 'N/A') + '</td>' +

                    '<td style="padding: 12px; border: 1px solid #ddd;">' + (emp.email || 'N/A') + '</td>' +

                    '<td style="padding: 12px; border: 1px solid #ddd;">' + (sucursal ? sucursal.nombre : 'N/A') + '</td>' +

                    '<td style="padding: 12px; border: 1px solid #ddd;">' + (emp.rol || 'N/A') + '</td>' +

                    '<td style="padding: 12px; border: 1px solid #ddd;">' + (emp.telefono || 'N/A') + '</td>' +

                    '<td style="padding: 12px; border: 1px solid #ddd;"><span style="background: ' + (emp.activo ? '#27ae60' : '#e67e22') + '; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;">' + (emp.activo ? 'Activo' : 'Inactivo') + '</span></td>' +

                    '<td style="padding: 12px; border: 1px solid #ddd;"><button style="background: #1a73e8; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; margin-right: 4px;" onclick="abrirModalEmpleado(' + emp.id + ')">Editar</button> ' +

                        '<button style="background: #dc3545; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600;" onclick="eliminarEmpleado(' + emp.id + ')">✕</button></td>' +

                    '</tr>';
                }).join('') +

                '</tbody>' +

                '</table>';



            container.innerHTML = html;

        }



        function abrirModalEmpleado(empleadoId = null) {

            const modal = document.getElementById('modalEmpleado');

            const title = document.getElementById('modalTitle');



            if (empleadoId) {

                title.textContent = 'Editar Empleado';

                const empleado = allEmpleados.find(e => e.id === empleadoId);

                if (empleado) {

                    document.getElementById('editingEmpleadoId').value = empleadoId;

                    document.getElementById('inputNombreEmpleado').value = empleado.nombre_completo || '';

                    document.getElementById('inputEmailEmpleado').value = empleado.email || '';

                    document.getElementById('inputRolEmpleado').value = empleado.rol || '';

                    document.getElementById('inputSucursalEmpleado').value = empleado.sucursal_id || '';

                    document.getElementById('inputTelefonoEmpleado').value = empleado.telefono || '';

                    document.getElementById('inputCodigoEmpleado').value = empleado.codigo_empleado || '';

                }

            } else {

                title.textContent = 'Agregar Empleado';

                document.getElementById('editingEmpleadoId').value = '';

                document.getElementById('inputNombreEmpleado').value = '';

                document.getElementById('inputEmailEmpleado').value = '';

                document.getElementById('inputRolEmpleado').value = 'colorista';

                document.getElementById('inputSucursalEmpleado').value = '';

                document.getElementById('inputTelefonoEmpleado').value = '';

                document.getElementById('inputCodigoEmpleado').value = '';

            }



            modal.classList.add('active');

        }



        function cerrarModalEmpleado() {

            document.getElementById('modalEmpleado').classList.remove('active');

        }



        async function guardarEmpleado() {

            const empleadoId = document.getElementById('editingEmpleadoId').value;

            const nombre = document.getElementById('inputNombreEmpleado').value;

            const email = document.getElementById('inputEmailEmpleado').value;

            const rol = document.getElementById('inputRolEmpleado').value;

            const sucursal_id = document.getElementById('inputSucursalEmpleado').value;

            const telefono = document.getElementById('inputTelefonoEmpleado').value;

            const codigo = document.getElementById('inputCodigoEmpleado').value;



            if (!nombre || !sucursal_id) {

                alert('Por favor completa los campos requeridos');

                return;

            }



            try {

                let res;

                if (empleadoId) {

                    res = await fetch(API + '/api/v1/empleados/' + empleadoId, {

                        method: 'PUT',

                        headers: { 'Content-Type': 'application/json' },

                        body: JSON.stringify({

                            nombre_completo: nombre,

                            email: email,

                            rol: rol,

                            sucursal_id: sucursal_id,

                            telefono: telefono,

                            codigo_empleado: codigo

                        })

                    });

                } else {

                    res = await fetch(API + '/api/v1/empleados', {

                        method: 'POST',

                        headers: { 'Content-Type': 'application/json' },

                        body: JSON.stringify({

                            nombre_completo: nombre,

                            email: email,

                            rol: rol,

                            sucursal_id: sucursal_id,

                            telefono: telefono,

                            codigo_empleado: codigo

                        })

                    });

                }



                if (!res.ok) throw new Error('Error al guardar');



                cerrarModalEmpleado();

                await loadData();

            } catch (e) {

                console.error('Error:', e);

                alert('Error al guardar el empleado');

            }

        }



        async function eliminarEmpleado(empleadoId) {

            if (!confirm('Â¿Estás seguro de que deseas eliminar este empleado?')) return;



            try {

                const res = await fetch(API + '/api/v1/empleados/' + empleadoId, {

                    method: 'DELETE'

                });



                if (!res.ok) throw new Error('Error al eliminar');



                await loadData();

            } catch (e) {

                console.error('Error:', e);

                alert('Error al eliminar el empleado');

            }

        }
